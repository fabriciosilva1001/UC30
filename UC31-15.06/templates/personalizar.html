{% extends 'base.html' %}

{% block titulo %}
    Preferências
{% endblock %}

{% block conteudo %}

<div class="form-container">

    <h1>Preferências</h1>

    <form action="{{ url_for('personalizar') }}"
          method="POST">

        <div class="form-group">

            <label for="nome">
                Nome
            </label>

            <input type="text"
                   id="nome"
                   name="nome"
                   value="{{ nome_atual }}">

        </div>


        <div class="form-group">

            <label>Tema</label>

            <div class="radio-grupo">

                <label>
                    <input type="radio"
                           name="tema"
                           value="claro"
                           {% if tema_atual == 'claro' %}
                           checked
                           {% endif %}>

                    Claro
                </label>

                <label>
                    <input type="radio"
                           name="tema"
                           value="escuro"
                           {% if tema_atual == 'escuro' %}
                           checked
                           {% endif %}>

                    Escuro
                </label>

            </div>

        </div>


        <div class="form-group">

            <label for="idioma">
                Idioma
            </label>

            <select id="idioma"
                    name="idioma">

                <option value="pt" {% if idioma_atual == 'pt' %}selected{% endif %}>
                    Português
                </option>

                <option value="en" {% if idioma_atual == 'en' %}selected{% endif %}>
                    English
                </option>

                <option value="es" {% if idioma_atual == 'es' %}selected{% endif %}>
                    Español
                </option>

            </select>

        </div>


        <div class="form-group">

            <label for="cor">
                Cor Favorita
            </label>

            <input type="color"
                   id="cor"
                   name="cor"
                   value="{{ cor_atual if cor_atual else '#000000' }}">

        </div>


        <div class="form-group">

            <label class="checkbox-label">

                <input type="checkbox"
                       name="lembrar"
                       value="sim">

                Lembrar por 7 dias

            </label>

        </div>

        <button type="submit"
                class="btn-primary">

            Salvar

        </button>

    </form>

</div>

{% endblock %}
