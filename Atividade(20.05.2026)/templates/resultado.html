<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Cadastro</title>
</head>
<body>

    <h2>Dados Recebidos pelo Servidor</h2>
    <p>Veja abaixo as informações que foram enviadas pela URL:</p>
    
    <hr>

    <blockquote>
        <p><strong>Nome Cadastrado:</strong> {{ nome }}</p>
        <p><strong>Curso Informado:</strong> {{ curso }}</p>
        <p><strong>Cidade de Origem:</strong> {{ cidade }}</p>
        <p><strong>E-mail de Contato:</strong> {{ email }}</p> 
    </blockquote>

    <hr>

    <p>
        <a href="/">Voltar para o formulário</a>
    </p>

</body>
</html>
