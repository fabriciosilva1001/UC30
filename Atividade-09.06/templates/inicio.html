<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Preferências</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{{ tema }}">

    <div class="container">
        <a href="{{ url_for('configurar', acao='tema', valor='escuro' if tema == 'claro' else 'claro') }}">
    
        </a>

        {% if nome %}
            <h1>Olá, {{ nome }}!</h1>
            <a href="{{ url_for('configurar', acao='limpar') }}">Limpar</a>
        {% else %}
            <h1>Bem-vindo!</h1>
            <form action="{{ url_for('configurar', acao='nome') }}" method="POST">
                <input type="text" name="nome" placeholder="Nome" required>
                <button type="submit">Ok</button>
            </form>
        {% endif %}
    </div>

</body>
</html>
